<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Suite — Superparty</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c14;--surface:#151525;--surface2:#1c1c34;--border:#2a2a44;--text:#e8e8f4;--dim:#7a7a9e;--accent:#8b5cf6;--accent-glow:rgba(139,92,246,.12);--green:#34d399;--yellow:#fbbf24;--red:#f87171;--orange:#fb923c;--blue:#60a5fa;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:220px;background:linear-gradient(180deg,#151525,#0f0f1f);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-header h1 span{color:var(--accent)}
.nav{flex:1;padding:8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--dim);font-size:13px;font-weight:500;transition:all .2s;margin-bottom:2px}
.nav-item:hover{background:var(--accent-glow);color:var(--text)}
.nav-item.active{background:var(--accent);color:white}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-item .badge{background:rgba(255,255,255,.15);padding:1px 6px;border-radius:8px;font-size:10px;margin-left:auto}
.nav-divider{height:1px;background:var(--border);margin:8px 12px}
/* Main content */
.main{margin-left:220px;flex:1;min-height:100vh}
.topbar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.topbar h2{font-size:16px;font-weight:600}
.topbar .search{display:flex;gap:8px}
.topbar input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--text);font-size:13px;width:250px}
.topbar input:focus{outline:none;border-color:var(--accent)}
.content{padding:20px 24px;max-width:1400px}
.panel{display:none}.panel.active{display:block}
/* Cards & tables same as brain-console */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--dim);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover{background:var(--accent-glow)}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.tag-green{background:rgba(52,211,153,.15);color:var(--green)}.tag-yellow{background:rgba(251,191,36,.15);color:var(--yellow)}
.tag-red{background:rgba(248,113,113,.15);color:var(--red)}.tag-blue{background:rgba(96,165,250,.15);color:var(--blue)}
.tag-purple{background:var(--accent-glow);color:var(--accent)}.tag-orange{background:rgba(251,146,60,.15);color:var(--orange)}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--dim)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:11px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.stat-card .number{font-size:28px;font-weight:700;color:var(--accent)}.stat-card .label{font-size:11px;color:var(--dim);text-transform:uppercase;margin-top:4px}
.loader{text-align:center;padding:40px;color:var(--dim)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--dim)}.empty .icon{font-size:48px;margin-bottom:12px}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px;display:inline-block}
input,select,textarea{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit}
textarea{resize:vertical;min-height:80px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.form-group{margin-bottom:12px}.form-group label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px;text-transform:uppercase}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:100}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:85vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:16px}
.detail-row{display:flex;gap:8px;margin-bottom:8px;font-size:13px}.detail-row .dl{color:var(--dim);min-width:140px}.detail-row .dv{color:var(--text);word-break:break-word}
.msg-bubble{padding:8px 12px;border-radius:8px;margin:4px 0;font-size:13px;max-width:80%}
.msg-client{background:var(--surface2);margin-right:auto}.msg-ai{background:var(--accent-glow);border:1px solid rgba(139,92,246,.3);margin-left:auto}
.memory-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.memory-block h4{font-size:12px;color:var(--accent);margin-bottom:6px;text-transform:uppercase}
.memory-block pre{font-size:12px;color:var(--dim);white-space:pre-wrap;word-break:break-word}
.coverage-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;margin-bottom:8px}
.tabs-inline{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab-inline{padding:8px 14px;font-size:12px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .2s}
.tab-inline:hover{color:var(--text)}.tab-inline.active{color:var(--accent);border-bottom-color:var(--accent)}
</style>
<script src="/js/auth-guard.js"></script>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header"><h1>⚡ <span>Admin</span> Suite</h1></div>
  <div class="nav">
    <div class="nav-item" data-module="operator"><span class="icon">💬</span>Operator Desk</div>
    <div class="nav-divider"></div>
    <div class="nav-item" data-module="creier"><span class="icon">🧠</span>Creier AI</div>
    <div class="nav-item" data-module="roles"><span class="icon">🎭</span>Roluri & Logică</div>
    <div class="nav-divider"></div>
    <div class="nav-item" data-module="vertex"><span class="icon">🤖</span>Vertex AI</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h2 id="pageTitle">Dashboard</h2>
    <div class="search"><input type="text" id="globalSearch" placeholder="Search clients, conversations..." onkeydown="if(event.key==='Enter')searchGlobal()"></div>
  </div>
  <div class="content" id="mainContentArea">

    <!-- ═══ OPERATOR DESK (IFRAME) ═══ -->
    <div class="panel" id="mod-operator" style="height: calc(100vh - 58px); padding: 0; margin: -20px -24px;">
      <iframe src="/admin/operator-desk.html?embed=1" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
    </div>

    <!-- ═══ LOGISTICS (BLANK) ═══ -->
    <div class="panel" id="mod-logistics">
      <div class="empty"><div class="icon">📅</div><p>Modulul de Calendar & Logistică va fi implementat aici.</p></div>
    </div>

    <!-- ═══ CREIER AI (SIMPLIFICAT) ═══ -->
    <div class="panel" id="mod-creier"><div class="loader"><div class="spinner"></div></div></div>

    <!-- ═══ ROLES ═══ -->
    <div class="panel" id="mod-roles"><div class="loader"><div class="spinner"></div></div></div>

    <!-- ═══ VERTEX AI ═══ -->
    <div class="panel" id="mod-vertex"><div class="loader"><div class="spinner"></div></div></div>

  </div>

<div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>

<script>
const API = '/api/admin';
const BRAIN = '/api/ai/brain';

// ── Navigation ──
document.querySelectorAll('.nav-item').forEach(n=>{
  n.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    n.classList.add('active');
    const mod=n.dataset.module;
    document.getElementById('mod-'+mod).classList.add('active');
    document.getElementById('pageTitle').textContent=n.textContent.trim();
    
    // Toggle topbar for full-screen modules like Operator Desk
    const topbar = document.querySelector('.topbar');
    const content = document.querySelector('.content');
    if(mod === 'operator') {
      topbar.style.display = 'none';
      content.style.padding = '0';
      document.getElementById('mod-operator').style.height = '100vh';
      document.getElementById('mod-operator').style.margin = '0';
    } else {
      topbar.style.display = 'flex';
      content.style.padding = '20px 24px';
    }
    
    loadModule(mod);
  });
});

function loadModule(m){const l={operator:()=>{},creier:loadCreier,roles:()=>{loadRoles();loadPlaybooks();},vertex:loadVertex};if(l[m])l[m]()}
const tokenFromUrl = new URLSearchParams(window.location.search).get('token');
if(tokenFromUrl) localStorage.setItem('token', tokenFromUrl);

async function api(path,opts={}) {
  const token = new URLSearchParams(window.location.search).get('token') || localStorage.getItem('token');
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const r = await fetch(path, { headers, ...opts });
  let data;
  try { data = await r.json(); } catch(e) { data = { error: await r.text() }; }
  if (!r.ok) throw new Error(data.error || 'Status ' + r.status);
  return data;
}
function timeAgo(d){const s=Math.floor((new Date()-new Date(d))/1e3);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function openModal(h){document.getElementById('modalContent').innerHTML=h;document.getElementById('modal').classList.add('open')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

document.addEventListener('keydown', e => {
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('globalSearch').focus()}
});

// Auto-load first module
document.querySelector('[data-module="operator"]').click();

function searchGlobal(){
  const q=document.getElementById('globalSearch').value.trim();
  if(!q)return;
  // Switch to CRM and search
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  document.querySelector('[data-module="crm"]').classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('mod-crm').classList.add('active');
  document.getElementById('pageTitle').textContent='CRM / Clients';
  loadCRM(q);
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
async function loadDashboard(){
  const d=await api(API+'/dashboard');
  document.getElementById('mod-dashboard').innerHTML=`
    <div class="grid-4" style="margin-bottom:20px">
      <div class="stat-card"><div class="number">${d.crm?.clients||0}</div><div class="label">Clients</div></div>
      <div class="stat-card"><div class="number">${d.crm?.conversations||0}</div><div class="label">Conversations</div></div>
      <div class="stat-card"><div class="number">${d.memory?.entries||0}</div><div class="label">Memory Entries</div></div>
      <div class="stat-card"><div class="number">${d.brain?.decisions||0}</div><div class="label">AI Decisions</div></div>
    </div>
    <div class="grid-4" style="margin-bottom:20px">
      <div class="stat-card"><div class="number" style="color:var(--green)">${d.brain?.active_rules||0}</div><div class="label">Active Rules</div></div>
      <div class="stat-card"><div class="number" style="color:var(--blue)">${d.brain?.coverage_zones||0}</div><div class="label">Coverage Zones</div></div>
      <div class="stat-card"><div class="number">${d.pricing?.event_plans||0}</div><div class="label">Event Plans</div></div>
      <div class="stat-card"><div class="number">${d.pricing?.quotes||0}</div><div class="label">Quotes</div></div>
    </div>
    <div class="grid-3">
      <div class="stat-card"><div class="number">${d.employees?.total||0}</div><div class="label">Employees</div></div>
      <div class="stat-card"><div class="number">${d.analytics?.events||0}</div><div class="label">Analytics Events</div></div>
      <div class="stat-card"><div class="number" style="color:var(--orange)">${d.analytics?.kb_misses||0}</div><div class="label">KB Misses</div></div>
    </div>`;
  document.getElementById('navCrmCount').textContent=d.crm?.clients||0;
}

// ═══════════════════════════════════════
// CRM
// ═══════════════════════════════════════
async function loadCRM(search=''){
  const q=search||document.getElementById('globalSearch')?.value||'';
  const d=await api(API+'/crm/clients?limit=50'+(q?'&search='+encodeURIComponent(q):''));
  const el=document.getElementById('mod-crm');
  if(!d.clients?.length){el.innerHTML='<div class="empty"><div class="icon">👥</div><p>No clients found</p></div>';return}
  let h=`<div style="margin-bottom:12px;color:var(--dim);font-size:12px">${d.total} clients total</div>
    <table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Source</th><th>Created</th><th></th></tr></thead><tbody>`;
  for(const c of d.clients){
    h+=`<tr>
      <td><b>${c.full_name||c.public_alias||'—'}</b></td>
      <td style="font-size:12px">${c.real_phone_e164||'—'}</td>
      <td style="font-size:12px">${c.email||'—'}</td>
      <td><span class="tag tag-blue">${c.source||'?'}</span></td>
      <td style="font-size:11px">${timeAgo(c.created_at)}</td>
      <td><button class="btn btn-sm btn-outline" onclick="viewClient('${c.id}')">View</button> <button class="btn btn-sm btn-outline" onclick="openMemoryForClient('${c.id}')">🧠</button></td>
    </tr>`}
  h+='</tbody></table>';
  el.innerHTML=h;
}

async function viewClient(id){
  const d=await api(API+'/crm/clients/'+id);
  const c=d.client;
  let msgsH=d.latest_messages?.slice(0,15).map(m=>`<div class="msg-bubble msg-${m.sender_type==='client'?'client':'ai'}">${m.content}</div>`).join('')||'<i>No messages</i>';
  let plansH=d.event_plans?.map(p=>{
    let stColor = 'blue';
    if(p.status === 'draft') stColor = 'purple';
    if((p.status||'').includes('operator')) stColor = 'orange';
    if(p.status === 'rezervat') stColor = 'green';
    
    let comColor = 'blue';
    if(p.status_comercial === 'handoff_operator') comColor = 'orange';
    if(p.status_comercial === 'confirmat') comColor = 'green';
    
    return `<div class="card" style="margin-bottom:8px; border-left: 4px solid var(--${stColor});">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <b>${p.event_type||'Eveniment'} ${p.event_date||''}</b>
      <div>
        <span class="tag tag-${stColor}">${(p.status||'NECUNOSCUT').toUpperCase()}</span> 
        <span class="tag tag-${comColor}">${(p.status_comercial||'—').replace('_', ' ').toUpperCase()}</span>
      </div>
    </div>
    <div style="font-size:12px;color:var(--dim)">Servicii: ${(p.requested_services||[]).join(', ') || 'Nespecificat'}</div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-sm btn-outline" style="color:var(--orange);border-color:var(--orange)" onclick="if(confirm('Preiei conversația de la AI? Agentul nu va mai trimite mesaje automate acestui client.')) setEventStatus('${c.id}','${p.id}','handoff_operator', event)">🙋 Handoff Operator</button>
      <button class="btn btn-sm btn-outline" style="color:var(--green);border-color:var(--green)" onclick="if(confirm('Confirmi rezervarea ferma pentru acest eveniment?')) setEventStatus('${c.id}','${p.id}','confirmat', event)">✅ Marchează Rezervat</button>
    </div>
  </div>`;
}).join('')||'<i style="color:var(--dim)">Niciun eveniment activ.</i>';
  let quotesH=d.quotes?.map(q=>`<div class="detail-row"><span class="dl">Quote #${q.id?.substring(0,8)}</span><span class="dv"><span class="tag tag-${q.status==='accepted'?'green':q.status==='rejected'?'red':'yellow'}">${q.status}</span> ${q.grand_total||0} RON</span></div>`).join('')||'<i>No quotes</i>';

  openModal(`
    <h2>${c.full_name||c.public_alias||'Client'}</h2>
    <div class="grid-2" style="margin-bottom:16px">
      <div class="detail-row"><span class="dl">Phone</span><span class="dv">${c.real_phone_e164||'—'}</span></div>
      <div class="detail-row"><span class="dl">Email</span><span class="dv">${c.email||'—'}</span></div>
      <div class="detail-row"><span class="dl">Source</span><span class="dv">${c.source||'—'}</span></div>
      <div class="detail-row"><span class="dl">Alias</span><span class="dv">${c.public_alias||'—'}</span></div>
    </div>
    ${d.memory?`<h3 style="margin:12px 0 8px">🧠 Memory</h3>
    <div class="memory-block"><h4>Memory JSON</h4><pre>${JSON.stringify(d.memory.memory_json,null,2)||'null'}</pre></div>
    <div class="memory-block"><h4>Preferences</h4><pre>${JSON.stringify(d.memory.preferences_json,null,2)||'null'}</pre></div>
    <div class="memory-block"><h4>Restrictions</h4><pre>${JSON.stringify(d.memory.restrictions_json,null,2)||'null'}</pre></div>`:'<p style="color:var(--dim);margin:12px 0">No memory data</p>'}
    <h3 style="margin:12px 0 8px">📋 Event Plans</h3>${plansH}
    <h3 style="margin:12px 0 8px">💰 Quotes</h3>${quotesH}
    <h3 style="margin:12px 0 8px">💬 Latest Messages</h3>
    <div style="max-height:200px;overflow-y:auto;padding:8px;background:var(--bg);border-radius:8px">${msgsH}</div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="openMemoryForClient('${id}');closeModal()">🧠 Full Memory</button>
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
    </div>`);
}

async function setEventStatus(clientId, eventId, newStatus, eventTarget) {
  try {
    const payload = newStatus === 'handoff_operator' 
      ? { status_comercial: newStatus } 
      : { status_rezervare: newStatus };
    const btn = eventTarget.target;
    btn.textContent = '...';
    btn.disabled = true;
    await api(`${API}/crm/clients/${clientId}/events/${eventId}`, {
      method: 'PUT',
      body: JSON.stringify(payload)
    });
    viewClient(clientId);
  } catch(e) { alert('Eroare: ' + e.message); }
}

function openMemoryForClient(id){
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  document.querySelector('[data-module="memory"]').classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('mod-memory').classList.add('active');
  document.getElementById('pageTitle').textContent='Memory Inspector';
  document.getElementById('memClientId').value=id;
  loadMemory();
}

// ═══════════════════════════════════════
// MEMORY INSPECTOR
// ═══════════════════════════════════════
async function loadMemory(){
  const cid=document.getElementById('memClientId').value.trim();
  if(!cid){document.getElementById('memoryContent').innerHTML='<p style="color:var(--dim)">Enter a client ID above</p>';return}
  const d=await api(API+'/memory/'+cid);
  const el=document.getElementById('memoryContent');
  if(!d.memory&&!d.event_plans?.length){el.innerHTML='<div class="empty"><div class="icon">🧠</div><p>No memory data for this client</p></div>';return}

  let h='';
  if(d.memory){
    h+=`<h3 style="margin:16px 0 8px">📝 Client Memory</h3>
    <div class="grid-2">
      <div class="memory-block"><h4>Memory JSON</h4><pre>${JSON.stringify(d.memory.memory_json,null,2)||'null'}</pre>
        <button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="editMemoryField('${cid}','memory_json')">✏️ Edit</button></div>
      <div class="memory-block"><h4>Preferences</h4><pre>${JSON.stringify(d.memory.preferences_json,null,2)||'null'}</pre>
        <button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="editMemoryField('${cid}','preferences_json')">✏️ Edit</button></div>
      <div class="memory-block"><h4>Restrictions</h4><pre>${JSON.stringify(d.memory.restrictions_json,null,2)||'null'}</pre>
        <button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="editMemoryField('${cid}','restrictions_json')">✏️ Edit</button></div>
      <div class="memory-block"><h4>Decision Makers</h4><pre>${JSON.stringify(d.memory.decision_makers_json,null,2)||'null'}</pre>
        <button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="editMemoryField('${cid}','decision_makers_json')">✏️ Edit</button></div>
    </div>

async function saveCreierRule() {
  const id = document.getElementById('crEditId').value;
  const patStr = document.getElementById('crPatterns').value;
  const rulStr = document.getElementById('crRules').value;

  if(!patStr || !rulStr) return alert('Te rog completează ambele câmpuri!');
  
  const patterns = patStr.split(',').map(s=>s.trim()).filter(Boolean);
  
  let keyVal = undefined;
  if (!id) {
    const baseWord = patterns[0] ? patterns[0].replace(/[^a-zA-Z0-9]/g, '').slice(0, 15) : 'kb';
    keyVal = baseWord + '_' + Math.floor(Math.random()*1000000);
  }

  const payload = {
    category: 'faq',
    question_patterns: patterns,
    answer_template: rulStr,
    approval_status: 'approved'
  };
  if (keyVal) payload.knowledge_key = keyVal;

  const method = id ? 'PUT' : 'POST';
  const url = id ? API+'/pricing/kb/'+id : API+'/pricing/kb';

  try {
    const btn = document.querySelector('.modal .btn-primary');
    if(btn) { btn.textContent = 'Se salvează...'; btn.disabled = true; }
    await api(url, { method, body: JSON.stringify(payload) });
    closeModal();
    loadCreier();
  } catch(e) { alert('Eroare: ' + e.message); }
}

async function deleteCreierRule(id) {
  if(!confirm('Ești sigur că vrei să ștergi? AI-ul va uita imediat această informație.')) return;
  try {
    await api(API+'/pricing/kb/'+id, { method: 'DELETE' });
    closeModal();
    loadCreier();
  } catch(e) { alert('Eroare: ' + e.message); }
}

async function saveRoleRule() {
  if(!confirm('Atenție: Modificarea acestor reguli de business va afecta imediat modul în care răspunde AI-ul. Doriți să salvați?')) return;
  
  const id = document.getElementById('rlEditId').value;
  const key = document.getElementById('rlKey').value;
  const patStr = document.getElementById('rlPatterns').value;
  
  if(!key) return alert('Te rog selectează rolul!');
  
  const patterns = patStr.split(',').map(s=>s.trim()).filter(Boolean);
  const pModel = document.getElementById('rlPricingModel').value;
  const confidenceVal = parseFloat(document.getElementById(pModel === 'linear_meter' ? 'rlConfLinear' : (pModel === 'fixed_price' ? 'rlConfFixed' : 'rlConf')).value) || 0.35;
  
  const policy_config = {
    role_key: key,
    service_key: document.getElementById('rlSvcKey').value,
    label: document.getElementById('rlLabel').value.trim() || 'Nespecificat',
    active: document.getElementById('rlActive').checked,
    priority: parseInt(document.getElementById('rlPriority').value) || 100,
    triggers: {
      keywords: patterns,
      service_tags: document.getElementById('rlSvcTags').value.split(',').map(s=>s.trim()).filter(Boolean),
      min_confidence: confidenceVal
    },
    pricing_rules: {
      pricing_model: pModel,
      base_price: parseInt(document.getElementById('rlBasePrice').value) || 0,
      currency: 'RON',
      included_duration_hours: parseFloat(document.getElementById('rlIncHours').value) || 1,
      extra_hour_price: parseInt(document.getElementById('rlExtraPrice').value) || 0,
      fixed_price: parseInt(document.getElementById('rlFixedPrice').value) || 0,
      price_per_linear_meter: parseInt(document.getElementById('rlLinearPrice').value) || 0,
      allow_model_choice: document.getElementById('rlAllowModelChoice').checked,
      allowed_models: document.getElementById('rlAllowedModels').value.split(',').map(s=>s.trim()).filter(Boolean),
      transport_rules: {
        bucharest: parseInt(document.getElementById('rlTrBuc').value) || 0,
        if: parseInt(document.getElementById('rlTrIf').value) || 0,
        outside_if: document.getElementById('rlTrOut').value === 'manual_quote' ? 'manual_quote' : (parseInt(document.getElementById('rlTrOut').value) || 0)
      }
    },
    constraints: {
      allow_discounts: document.getElementById('rlAllowDisc').checked,
      must_collect_fields: document.getElementById('rlReqFields').value.split(',').map(s=>s.trim()).filter(Boolean),
      must_not_confirm_availability: document.getElementById('rlBlockConf').checked,
      must_not_override_approved_prices: document.getElementById('rlBlockOv').checked
    },
    copy_blocks: {
      intro: document.getElementById('rlIntro').value.trim(),
      upsell: document.getElementById('rlUpsell').value.trim(),
      closing_question: document.getElementById('rlClosing').value.trim(),
      follow_up: document.getElementById('rlFollowUp').value.trim()
    }
  };

  const payload = {
    knowledge_key: key,
    category: 'services',
    question_patterns: patterns,
    answer_template: "Structura acestui rol a fost migrata catre Commercial Policy Engine (JSONB). Vezi policy_config pentru logică.",
    policy_config: policy_config,
    approval_status: 'approved'
  };

  const method = id ? 'PUT' : 'POST';
  const url = id ? API+'/pricing/kb/'+id : API+'/pricing/kb';

  try {
    const btn = document.querySelector('.modal .btn-primary');
    if(btn) { btn.textContent = 'Se salvează...'; btn.disabled = true; }
    await api(url, { method, body: JSON.stringify(payload) });
    closeModal();
    loadRoles();
  } catch(e) { alert('Eroare: ' + e.message); }
}

async function deleteRoleRule(id) {
  if(!confirm('Dacă ștergi, AI-ul nu va mai știi prețurile pentru acest rol! Continuăm?')) return;
  try {
    await api(API+'/pricing/kb/'+id, { method: 'DELETE' });
    closeModal();
    loadRoles();
  } catch(e) { alert('Eroare: ' + e.message); }
}

async function savePlaybook() {
  const key = document.getElementById('pbKey').value;
  const strategy = document.getElementById('pbStrategy').value.trim();
  const tone = document.getElementById('pbTone').value.trim();
  
  if (!strategy || !tone) return alert('Ambele câmpuri sunt obligatorii!');
  
  try {
    const btn = document.querySelector('.modal .btn-primary');
    if(btn) { btn.textContent = 'Se aplică...'; btn.disabled = true; }
    
    await api(API+'/playbooks/'+key, { 
      method: 'PUT',
      body: JSON.stringify({ strategy, tone })
    });
    
    closeModal();
    loadPlaybooks();
  } catch(e) { 
    alert('Eroare: ' + e.message); 
    const btn = document.querySelector('.modal .btn-primary');
    if(btn) { btn.textContent = 'Aplică Live ⚡'; btn.disabled = false; }
  }
}

          </div>
          <div class="grid-2">
            <div class="form-group"><label>Tools (Function Calling)</label>
              <select id="vtxTools" onchange="saveVertexConfig('tools_enabled',this.value)">
                <option value="true" ${configMap.tools_enabled==='true'?'selected':''}>✅ Activ</option>
                <option value="false" ${configMap.tools_enabled==='false'?'selected':''}>❌ Dezactivat</option>
              </select>
            </div>
            <div class="form-group"><label>Auto-Reply WhatsApp</label>
              <select id="vtxAuto" onchange="saveVertexConfig('auto_reply',this.value)">
                <option value="true" ${configMap.auto_reply==='true'?'selected':''}>✅ Activ</option>
                <option value="false" ${configMap.auto_reply==='false'?'selected':''}>❌ Dezactivat</option>
              </select>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:8px;color:var(--accent)">📊 Statistici</h3>
          <div class="grid-3">
            <div class="stat-card"><div class="number">${sessions.count||0}</div><div class="label">Sesiuni</div></div>
            <div class="stat-card"><div class="number">${events.count||0}</div><div class="label">Evenimente</div></div>
            <div class="stat-card"><div class="number">${actions.count||0}</div><div class="label">Acțiuni</div></div>
          </div>
        </div>
      </div>
    </div>`;

    // Sessions table
    h += `<h3 style="margin:20px 0 12px">💬 Sesiuni Recente</h3>`;
    if(sessions.sessions?.length){
      h += `<table><thead><tr><th>Telefon</th><th>Status</th><th>Mesaje</th><th>Creat</th><th>Actualizat</th><th></th></tr></thead><tbody>`;
      for(const s of sessions.sessions){
        h += `<tr>
          <td><b>${s.phone_e164||'—'}</b></td>
          <td><span class="tag tag-${s.session_status==='active'?'green':s.session_status==='escalated'?'orange':'blue'}">${s.session_status}</span></td>
          <td>${s.messages_count||0}</td>
          <td style="font-size:11px">${timeAgo(s.created_at)}</td>
          <td style="font-size:11px">${timeAgo(s.updated_at)}</td>
          <td><button class="btn btn-sm btn-outline" onclick="viewVertexSession('${s.id}')">💬 Mesaje</button></td>
        </tr>`;
      }
      h += '</tbody></table>';
    } else { h += '<div class="empty"><div class="icon">💬</div><p>Nicio sesiune încă. Trimite un mesaj pe WhatsApp!</p></div>'; }

    // Events table
    h += `<h3 style="margin:20px 0 12px">🎉 Petreceri / Evenimente Notate</h3>`;
    if(events.events?.length){
      h += `<table><thead><tr><th>Tip</th><th>Dată</th><th>Locație</th><th>Invitați</th><th>Servicii</th><th>Status</th></tr></thead><tbody>`;
      for(const e of events.events){
        h += `<tr>
          <td><b>${e.event_type||'—'}</b></td>
          <td>${e.event_date||'TBD'} ${e.event_time||''}</td>
          <td>${e.location||'TBD'}</td>
          <td>${e.guest_count||'?'}</td>
          <td style="font-size:11px">${(e.services||[]).join(', ')||'—'}</td>
          <td><span class="tag tag-${e.status==='confirmed'?'green':'purple'}">${e.status||'draft'}</span></td>
        </tr>`;
      }
      h += '</tbody></table>';
    } else { h += '<div class="empty"><div class="icon">🎉</div><p>Niciun eveniment notat. AI-ul le va nota automat!</p></div>'; }

    // Actions log
    h += `<h3 style="margin:20px 0 12px">🔧 Ultimele Acțiuni</h3>`;
    if(actions.actions?.length){
      h += `<table><thead><tr><th>Acțiune</th><th>Succes</th><th>Argumente</th><th>Ora</th></tr></thead><tbody>`;
      for(const a of actions.actions){
        h += `<tr>
          <td><b>${a.action_name}</b></td>
          <td>${a.success?'<span class="tag tag-green">✅</span>':'<span class="tag tag-red">❌</span>'}</td>
          <td style="font-size:11px"><span class="truncate">${JSON.stringify(a.action_args||{})}</span></td>
          <td style="font-size:11px">${timeAgo(a.executed_at)}</td>
        </tr>`;
      }
      h += '</tbody></table>';
    } else { h += '<div class="empty"><div class="icon">🔧</div><p>Nicio acțiune executată încă.</p></div>'; }

    el.innerHTML = h;
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Eroare: ${e.message}</p><p style="font-size:12px;color:var(--dim);margin-top:8px">Serverul manager-ai pornit?</p></div>`;
  }
}

async function saveVertexConfig(key, value) {
  try {
    await fetch(VERTEX_API+'/config/'+key, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({value})
    });
    // Visual feedback
    const btns = document.querySelectorAll('.btn-primary');
    const lastBtn = btns[btns.length-1];
    if(key === 'system_prompt') {
      const btn = document.querySelector('[onclick*="saveVertexConfig\'system_prompt\'"]') || lastBtn;
      if(btn) { const orig = btn.textContent; btn.textContent = '✅ Salvat!'; btn.style.background = 'var(--green)'; setTimeout(()=>{btn.textContent=orig;btn.style.background='';},2000); }
    }
  } catch(e) { alert('Eroare salvare: ' + e.message); }
}

async function viewVertexSession(sessionId) {
  try {
    const res = await fetch(VERTEX_API+'/sessions/'+sessionId+'/messages').then(r=>r.json());
    let h = `<h2>💬 Conversație</h2><div style="max-height:500px;overflow-y:auto;padding:8px;background:var(--bg);border-radius:8px;margin-top:12px">`;
    for(const m of (res.messages||[])) {
      const isUser = m.role === 'user';
      h += `<div class="msg-bubble msg-${isUser?'client':'ai'}" style="margin-bottom:8px">
        <div style="font-size:10px;color:var(--dim);margin-bottom:4px">${isUser?'👤 Client':'🤖 AI'} — ${timeAgo(m.created_at)}</div>
        ${m.content || (m.function_name ? '🔧 '+m.function_name : '—')}
      </div>`;
    }
    h += '</div><div style="margin-top:16px;text-align:right"><button class="btn btn-outline" onclick="closeModal()">Închide</button></div>';
    openModal(h);
  } catch(e) { alert('Eroare: '+e.message); }
}

function testVertexAI() {
  openModal(`
    <h2>🧪 Test Vertex AI</h2>
    <div class="form-group"><label>Telefon (simulat)</label><input id="vtxTestPhone" value="+40700000001"></div>
    <div class="form-group"><label>Mesajul clientului</label><textarea id="vtxTestMsg" rows="3" placeholder="Buna ziua, vreau o petrecere..."></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline" onclick="closeModal()">Anulează</button>
      <button class="btn btn-primary" id="vtxTestBtn" onclick="runVertexTest()">🚀 Trimite la AI</button>
    </div>
    <div id="vtxTestResult" style="margin-top:16px"></div>
  `);
}

async function runVertexTest() {
  const phone = document.getElementById('vtxTestPhone').value;
  const msg = document.getElementById('vtxTestMsg').value;
  if(!msg) return alert('Scrie un mesaj!');
  const btn = document.getElementById('vtxTestBtn');
  btn.textContent = '⏳ Se procesează...'; btn.disabled = true;
  try {
    const res = await fetch(VERTEX_API+'/test', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone, message: msg})
    }).then(r=>r.json());
    document.getElementById('vtxTestResult').innerHTML = `
      <div class="card" style="border-color:var(--green)">
        <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Răspuns în ${res.latencyMs||'?'}ms${res.functionCall?' | 🔧 '+res.functionCall.name:''}</div>
        <div style="font-size:15px;line-height:1.6;white-space:pre-wrap">${res.reply||res.error||'fără răspuns'}</div>
      </div>`;
  } catch(e) { document.getElementById('vtxTestResult').innerHTML = `<div class="card" style="border-color:var(--red)">❌ ${e.message}</div>`; }
  btn.textContent = '🚀 Trimite la AI'; btn.disabled = false;
}

// ── Init ──
loadCreier();
</script>
