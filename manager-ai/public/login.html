<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superparty — Autentificare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(120, 50, 255, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 50, 120, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(50, 120, 255, 0.06) 0%, transparent 50%);
      overflow: hidden;
    }

    /* Animated background particles */
    .bg-particles {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .login-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
      text-align: center;
    }

    .logo {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899, #f59e0b);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(139,92,246,0.3);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(139,92,246,0.3); }
      50% { box-shadow: 0 8px 48px rgba(139,92,246,0.5); }
    }

    h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .google-btn {
      width: 100%;
      padding: 14px 24px;
      background: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #1a1a2e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255,255,255,0.15);
    }
    .google-btn:active { transform: translateY(0); }
    .google-btn:disabled {
      opacity: 0.6; cursor: not-allowed; transform: none;
    }
    .google-btn svg { width: 20px; height: 20px; }

    .divider {
      display: flex; align-items: center; gap: 16px;
      margin: 28px 0;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .status-msg {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } }
    .status-msg.error {
      display: block;
      background: rgba(239,68,68,0.12);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .status-msg.info {
      display: block;
      background: rgba(139,92,246,0.12);
      color: #a78bfa;
      border: 1px solid rgba(139,92,246,0.2);
    }
    .status-msg.success {
      display: block;
      background: rgba(34,197,94,0.12);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.2);
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(255,255,255,0.2);
      font-size: 12px;
    }
    .footer a { color: rgba(255,255,255,0.4); text-decoration: none; }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.1);
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Admin login form */
    .admin-form { display: none; }
    .admin-form input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .admin-form input:focus { border-color: rgba(139,92,246,0.5); }
    .admin-form input::placeholder { color: rgba(255,255,255,0.3); }

    .admin-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .admin-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .toggle-admin {
      background: none; border: none;
      color: rgba(255,255,255,0.3);
      font-size: 12px; cursor: pointer;
      margin-top: 16px;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s;
    }
    .toggle-admin:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <!-- Background particles -->
  <div class="bg-particles" id="particles"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">🎉</div>
      <h1>Superparty</h1>
      <p class="subtitle">Manager AI — Autentifică-te pentru a continua</p>

      <!-- Google Login Button -->
      <button class="google-btn" id="googleBtn" onclick="loginWithGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Conectează-te cu Google
      </button>

      <div class="divider">sau</div>

      <!-- Admin Login (email/token) -->
      <div id="adminSection">
        <div class="admin-form" id="adminForm">
          <input type="email" id="adminEmail" placeholder="Email admin" />
          <input type="password" id="adminToken" placeholder="Token admin" />
          <button class="admin-btn" onclick="loginAdmin()">Intră ca Admin</button>
        </div>
        <button class="toggle-admin" onclick="toggleAdmin()">Login admin cu token</button>
      </div>

      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="footer">
      <p>© 2026 Superparty · <a href="#">Termeni</a> · <a href="#">Confidențialitate</a></p>
    </div>
  </div>

  <script>
    // ── Background Particles ──
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (8 + Math.random() * 12) + 's';
      p.style.animationDelay = Math.random() * 10 + 's';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      particlesEl.appendChild(p);
    }

    const BASE_URL = window.location.origin;

    // ── Check if already logged in ──
    (async function checkSession() {
      const token = localStorage.getItem('sp_session_token');
      if (!token) return;
      
      try {
        const res = await fetch(`${BASE_URL}/api/auth/check`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.authenticated) {
          if (data.onboarding_status === 'admin_approved' || data.role === 'admin') {
            window.location.href = '/ai-copilot.html';
          } else {
            window.location.href = '/onboarding.html';
          }
        }
      } catch (e) { /* not logged in */ }
    })();

    // ── Google Login ──
    function loginWithGoogle() {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Se conectează...';
      
      // Redirect to our API which handles Google OAuth
      window.location.href = `${BASE_URL}/api/auth/google`;
    }

    // ── Admin Login ──
    function toggleAdmin() {
      const form = document.getElementById('adminForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'block';
      document.querySelector('.toggle-admin').style.display = 'none';
    }

    async function loginAdmin() {
      const email = document.getElementById('adminEmail').value.trim();
      const token = document.getElementById('adminToken').value.trim();
      const statusEl = document.getElementById('statusMsg');

      if (!email || !token) {
        statusEl.className = 'status-msg error';
        statusEl.textContent = 'Completează toate câmpurile';
        return;
      }

      try {
        const res = await fetch(`${BASE_URL}/api/auth/admin-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('sp_session_token', data.session_token);
          statusEl.className = 'status-msg success';
          statusEl.textContent = '✅ Autentificare reușită!';
          setTimeout(() => window.location.href = '/ai-notebook.html', 500);
        } else {
          statusEl.className = 'status-msg error';
          statusEl.textContent = '❌ ' + (data.error || 'Token invalid');
        }
      } catch (e) {
        statusEl.className = 'status-msg error';
        statusEl.textContent = '❌ Eroare de conexiune';
      }
    }

    // ── Handle OAuth callback ──
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('session_token')) {
      localStorage.setItem('sp_session_token', urlParams.get('session_token'));
      const status = urlParams.get('onboarding_status');
      if (status === 'admin_approved') {
        window.location.href = '/ai-notebook.html';
      } else {
        window.location.href = '/onboarding.html';
      }
    }
    if (urlParams.get('error')) {
      const statusEl = document.getElementById('statusMsg');
      statusEl.className = 'status-msg error';
      statusEl.textContent = '❌ ' + urlParams.get('error');
    }
  </script>
</body>
</html>
