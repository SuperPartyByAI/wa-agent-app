<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Operator Desk — Superparty</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --bg-card: #181b23; --bg-hover: #1f2330; --bg-selected: #252a38;
  --border: #2a2e3a; --text: #e4e6ed; --text-muted: #8b8fa3; --text-dim: #5c6070;
  --accent: #6c8cff; --accent-soft: rgba(108,140,255,0.12);
  --green: #34d399; --green-soft: rgba(52,211,153,0.12);
  --orange: #fb923c; --orange-soft: rgba(251,146,60,0.12);
  --red: #f87171; --red-soft: rgba(248,113,113,0.12);
  --yellow: #fbbf24; --yellow-soft: rgba(251,191,36,0.12);
  --purple: #a78bfa; --purple-soft: rgba(167,139,250,0.12);
  --radius: 10px; --radius-sm: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

/* ─── TOP NAV ─── */
.topbar { display:flex; align-items:center; height:48px; background:var(--bg-card); border-bottom:1px solid var(--border); padding:0 16px; gap:12px; }
.logo { font-size:14px; font-weight:700; color:var(--accent); }
.logo span { color:var(--text-dim); font-weight:400; font-size:12px; }
.tabs { display:flex; gap:2px; margin-left:16px; }
.tab { padding:6px 14px; border-radius:var(--radius-sm); cursor:pointer; font-size:12px; font-weight:500; color:var(--text-muted); transition:all .15s; user-select:none; }
.tab:hover { color:var(--text); background:var(--bg-hover); }
.tab.active { color:var(--accent); background:var(--accent-soft); }
.tab .badge { display:inline-block; background:var(--red); color:#fff; font-size:10px; padding:1px 5px; border-radius:8px; margin-left:4px; font-weight:700; }
.topbar-r { margin-left:auto; display:flex; align-items:center; gap:10px; }
.health { font-size:11px; color:var(--green); display:flex; align-items:center; gap:4px; }
.health::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); }
.ext-link { font-size:11px; color:var(--text-dim); text-decoration:none; padding:4px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); }
.ext-link:hover { color:var(--text); }

/* ─── LAYOUT ─── */
.main { display:flex; height:calc(100vh - 48px); }

/* LEFT: Conv List */
.left { width:300px; min-width:240px; border-right:1px solid var(--border); display:flex; flex-direction:column; }
.search-box { padding:8px 10px; border-bottom:1px solid var(--border); }
.search-box input { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg-card); color:var(--text); font-size:12px; outline:none; }
.search-box input:focus { border-color:var(--accent); }
.filters { display:flex; gap:3px; padding:6px 10px; border-bottom:1px solid var(--border); overflow-x:auto; }
.flt { padding:3px 8px; border-radius:10px; font-size:10px; font-weight:500; cursor:pointer; border:1px solid var(--border); color:var(--text-muted); background:transparent; white-space:nowrap; }
.flt.active { background:var(--accent-soft); color:var(--accent); border-color:var(--accent); }
.conv-list { flex:1; overflow-y:auto; }
.cv { padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
.cv:hover { background:var(--bg-hover); }
.cv.sel { background:var(--bg-selected); border-left:3px solid var(--accent); }
.cv-top { display:flex; justify-content:space-between; margin-bottom:3px; }
.cv-name { font-size:12px; font-weight:600; }
.cv-time { font-size:10px; color:var(--text-dim); }
.cv-msg { font-size:11px; color:var(--text-muted); line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:4px; }
.cv-meta { display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
.badge-sm { font-size:9px; font-weight:600; padding:1px 6px; border-radius:8px; text-transform:uppercase; letter-spacing:.3px; }
.b-sent { background:var(--green-soft); color:var(--green); }
.b-shadow { background:var(--purple-soft); color:var(--purple); }
.b-pending { background:var(--orange-soft); color:var(--orange); }
.b-blocked { background:var(--red-soft); color:var(--red); }
.b-open { background:var(--yellow-soft); color:var(--yellow); }
.b-info { background:var(--bg-hover); color:var(--text-dim); }

/* CENTER: Detail */
.center { flex:1; display:flex; flex-direction:column; min-width:0; }
.empty-state { flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:13px; }
.detail-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.detail-header h2 { font-size:14px; font-weight:600; }
.detail-header .sub { font-size:10px; color:var(--text-dim); }
.detail-header .mem-link { font-size:11px; color:var(--accent); cursor:pointer; }

/* Messages */
.msgs { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:6px; }
.m { max-width:72%; padding:8px 12px; border-radius:var(--radius); font-size:12px; line-height:1.45; }
.m.cl { align-self:flex-start; background:var(--bg-card); border:1px solid var(--border); }
.m.ag { align-self:flex-end; background:var(--accent-soft); border:1px solid rgba(108,140,255,.15); }
.m.ai { align-self:flex-end; background:var(--purple-soft); border:1px solid rgba(167,139,250,.15); }
.m-who { font-size:9px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:1px; }
.m-time { font-size:9px; color:var(--text-dim); margin-top:2px; }

/* Event Plan Card */
.plan-card { margin:8px 16px; padding:10px 12px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); }
.plan-card h4 { font-size:11px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.plan-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:4px; }
.plan-field { font-size:11px; }
.plan-field .label { color:var(--text-dim); }
.plan-field .val { color:var(--text); font-weight:500; }
.plan-missing { font-size:10px; color:var(--orange); margin-top:4px; }

/* AI Reply Box */
.ai-box { border-top:1px solid var(--border); padding:12px 16px; background:var(--bg-card); }
.ai-label { font-size:10px; font-weight:600; color:var(--purple); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
.ai-label .tool-act { font-size:9px; padding:1px 6px; border-radius:4px; background:var(--accent-soft); color:var(--accent); }
.ai-label .safety { font-size:9px; padding:1px 6px; border-radius:4px; }
.safe-ok { background:var(--green-soft); color:var(--green); }
.safe-warn { background:var(--orange-soft); color:var(--orange); }
.safe-block { background:var(--red-soft); color:var(--red); }
.ai-text { width:100%; min-height:48px; padding:8px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:12px; font-family:inherit; resize:vertical; outline:none; line-height:1.4; }
.ai-text:focus { border-color:var(--accent); }
.ai-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.btn { padding:6px 12px; border:none; border-radius:var(--radius-sm); font-size:11px; font-weight:600; cursor:pointer; transition:all .15s; }
.b-approve { background:var(--green); color:#0f1117; }
.b-approve:hover { filter:brightness(1.1); }
.b-edit { background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent) !important; }
.b-edit:hover { background:var(--accent); color:#fff; }
.b-clarify { background:var(--orange-soft); color:var(--orange); }
.b-clarify:hover { background:var(--orange); color:#fff; }
.b-operator { background:var(--red-soft); color:var(--red); }
.b-operator:hover { background:var(--red); color:#fff; }
.b-mem { background:var(--bg-hover); color:var(--text-muted); }
.b-mem:hover { color:var(--text); }
.b-rule { background:transparent; color:var(--text-dim); border:1px solid var(--border) !important; }

/* RIGHT: Memory */
.right { width:320px; border-left:1px solid var(--border); background:var(--bg-card); display:flex; flex-direction:column; overflow:hidden; transition:width .2s; }
.right.hidden { width:0; border:none; }
.mem-hdr { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.mem-hdr h3 { font-size:13px; font-weight:600; }
.mem-close { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; padding:2px 6px; }
.mem-body { flex:1; overflow-y:auto; padding:10px 12px; }
.mem-sec { margin-bottom:14px; }
.mem-sec h4 { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.mf { background:var(--bg); padding:6px 8px; border-radius:var(--radius-sm); margin-bottom:4px; border:1px solid var(--border); }
.mf .lbl { font-size:10px; color:var(--text-dim); }
.mf .val { font-size:12px; }
.mf-acts { display:flex; gap:3px; margin-top:4px; }
.mf-acts button { font-size:9px; padding:1px 6px; border-radius:3px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; }
.mf-acts button:hover { color:var(--text); }
.mf-acts .wrong { color:var(--red); border-color:var(--red); }
.note-area { margin-top:10px; }
.note-area textarea { width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:11px; font-family:inherit; resize:vertical; min-height:40px; outline:none; }
.note-btn { margin-top:4px; padding:4px 10px; font-size:10px; background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent); border-radius:var(--radius-sm); cursor:pointer; }

/* RULES TAB */
.rules-view { display:none; flex:1; padding:16px 20px; overflow-y:auto; }
.rules-view.active { display:block; }
.rc { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:8px; }
.rc:hover { border-color:var(--text-dim); }
.rc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.rc-name { font-size:13px; font-weight:600; }
.toggle { position:relative; width:32px; height:18px; }
.toggle input { display:none; }
.toggle label { display:block; width:32px; height:18px; border-radius:9px; background:var(--border); cursor:pointer; transition:.2s; }
.toggle label::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:var(--text-muted); transition:.2s; }
.toggle input:checked+label { background:var(--green); }
.toggle input:checked+label::after { left:16px; background:#fff; }
.rc-desc { font-size:11px; color:var(--text-muted); line-height:1.3; margin-bottom:6px; }
.rc-tags { display:flex; gap:4px; flex-wrap:wrap; }
.rtag { font-size:9px; padding:2px 6px; border-radius:3px; background:var(--bg); border:1px solid var(--border); color:var(--text-dim); }
.add-btn { padding:8px 14px; border:2px dashed var(--border); border-radius:var(--radius); color:var(--text-muted); font-size:12px; cursor:pointer; text-align:center; background:transparent; width:100%; }
.add-btn:hover { border-color:var(--accent); color:var(--accent); }

/* SERVICE CONFIG */
.svc-section { margin-top:20px; }
.svc-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin-bottom:8px; }
.svc-card h4 { font-size:12px; font-weight:600; margin-bottom:6px; }
.svc-card .fields { display:flex; flex-wrap:wrap; gap:4px; }
.svc-card .field-tag { font-size:9px; padding:2px 6px; border-radius:3px; }
.field-req { background:var(--accent-soft); color:var(--accent); }
.field-opt { background:var(--bg); color:var(--text-dim); border:1px solid var(--border); }

/* ADMIN TAB */
.admin-view { display:none; flex:1; padding:16px 20px; overflow-y:auto; }
.admin-view.active { display:block; }
.admin-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px; }
.admin-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:12px; cursor:pointer; text-decoration:none; color:var(--text); display:block; }
.admin-card:hover { border-color:var(--accent); }
.admin-card h4 { font-size:12px; font-weight:600; margin-bottom:3px; }
.admin-card p { font-size:10px; color:var(--text-muted); }

/* MODAL */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
.modal-bg.show { display:flex; }
.modal { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; width:420px; max-height:75vh; overflow-y:auto; }
.modal h3 { margin-bottom:10px; font-size:14px; }
.modal input,.modal textarea,.modal select { width:100%; padding:7px 8px; margin-bottom:8px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:12px; font-family:inherit; outline:none; }
.modal .mrow { display:flex; gap:6px; justify-content:flex-end; }
.modal .ms { padding:6px 14px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm); cursor:pointer; font-size:11px; font-weight:600; }
.modal .mc { padding:6px 14px; background:transparent; color:var(--text-muted); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; font-size:11px; }

/* TOAST */
.toast { position:fixed; bottom:16px; right:16px; padding:8px 14px; border-radius:var(--radius-sm); font-size:12px; font-weight:500; z-index:200; opacity:0; transition:.3s; }
.toast.show { opacity:1; }
.toast.ok { background:var(--green); color:#0f1117; }
.toast.err { background:var(--red); color:#fff; }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">AI Operator Desk <span>· Superparty</span></div>
  <div class="tabs">
    <div class="tab active" data-tab="conv">Conversații <span class="badge" id="cBadge">0</span></div>
    <div class="tab" data-tab="rules">Reguli AI</div>
    <div class="tab" data-tab="admin">Admin ↗</div>
  </div>
  <div class="topbar-r">
    <div class="health" id="hDot">OK</div>
    <a class="ext-link" href="admin-suite.html" target="_blank">Suite</a>
    <a class="ext-link" href="../brain/brain-console.html" target="_blank">Brain</a>
  </div>
</div>

<div class="main">
  <!-- LEFT -->
  <div class="left" id="leftP">
    <div class="search-box"><input type="text" id="sBox" placeholder="Caută client sau mesaj..."></div>
    <div class="filters">
      <div class="flt active" data-f="all">Toate</div>
      <div class="flt" data-f="pending">De revizuit</div>
      <div class="flt" data-f="shadow">Shadow</div>
      <div class="flt" data-f="open">Deschise</div>
    </div>
    <div class="conv-list" id="cList"></div>
  </div>

  <!-- CENTER -->
  <div class="center" id="centerP">
    <div class="empty-state" id="emptyS">Selectează o conversație</div>
  </div>

  <!-- RIGHT: Memory -->
  <div class="right hidden" id="rightP">
    <div class="mem-hdr"><h3 id="mName">Memorie</h3><button class="mem-close" onclick="toggleMem(false)">✕</button></div>
    <div class="mem-body" id="mBody"></div>
  </div>

  <!-- RULES TAB -->
  <div class="rules-view" id="rulesV"></div>

  <!-- ADMIN TAB -->
  <div class="admin-view" id="adminV"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="ruleM">
  <div class="modal">
    <h3>Adaugă regulă</h3>
    <input id="rmN" placeholder="Nume regulă">
    <textarea id="rmD" rows="2" placeholder="Descriere"></textarea>
    <select id="rmT"><option value="">Când se aplică...</option><option value="PRICE_QUESTION">Preț</option><option value="COSTUME_QUERY">Costume</option><option value="RESCHEDULE">Reprogramare</option><option value="COMPLAINT">Plângere</option><option value="GENERAL">General</option></select>
    <select id="rmB"><option value="">Ce face AI-ul...</option><option value="CLARIFY_FIRST">Clarificare</option><option value="USE_KB">Răspunde din KB</option><option value="HANDOFF">Operator</option><option value="AUTO_REPLY">Auto</option><option value="BLOCK">Block</option></select>
    <div class="mrow"><button class="mc" onclick="closeRM()">Anulează</button><button class="ms" onclick="saveR()">Salvează</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = location.origin;
const TK = localStorage.getItem('admin_token') || '';
const H = () => ({'Content-Type':'application/json', ...(TK ? {'Authorization':`Bearer ${TK}`} : {})});

let inbox = [], selId = null, curClient = null, filter = 'all';

function toast(m, ok=true) { const t=document.getElementById('toast'); t.textContent=m; t.className=`toast ${ok?'ok':'err'} show`; setTimeout(()=>t.classList.remove('show'),2500); }
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function ago(iso) { if(!iso) return ''; const m=Math.floor((Date.now()-new Date(iso))/60000); return m<1?'acum':m<60?m+'m':m<1440?Math.floor(m/60)+'h':Math.floor(m/1440)+'z'; }
function stLbl(s) { return {sent:'Trimis',shadow:'Shadow',pending:'Revizuit',blocked:'Blocat',open:'Deschis'}[s]||s||'?'; }
function safeClass(s) { if(!s) return ''; if(s.includes('block')) return 'safe-block'; if(s.includes('review')||s.includes('warn')) return 'safe-warn'; return 'safe-ok'; }

// ─── TABS ───
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  const n=t.dataset.tab;
  document.getElementById('leftP').style.display=n==='conv'?'flex':'none';
  document.getElementById('centerP').style.display=n==='conv'?'flex':'none';
  document.getElementById('rightP').style.display=n==='conv'&&!document.getElementById('rightP').classList.contains('hidden')?'flex':'none';
  document.getElementById('rulesV').classList.toggle('active',n==='rules');
  document.getElementById('adminV').classList.toggle('active',n==='admin');
  if(n==='rules') loadRules();
  if(n==='admin') renderAdmin();
}));

document.querySelectorAll('.flt').forEach(f=>f.addEventListener('click',()=>{
  document.querySelectorAll('.flt').forEach(x=>x.classList.remove('active'));
  f.classList.add('active');
  filter=f.dataset.f;
  renderList();
}));

document.getElementById('sBox').addEventListener('input',e=>renderList(e.target.value));

// ─── LOAD INBOX ───
async function loadInbox() {
  try {
    const r = await fetch(`${API}/api/operator/inbox?limit=80`, {headers:H()});
    const d = await r.json();
    inbox = d.inbox || [];
    document.getElementById('cBadge').textContent = inbox.length;
    renderList();
  } catch(e) { console.error('Inbox error:', e); toast('Eroare încărcare','err'); }
}

function renderList(q='') {
  let items = inbox;
  if(filter!=='all') items=items.filter(c=>c.status===filter);
  if(q) { const lq=q.toLowerCase(); items=items.filter(c=>(c.client_name||'').toLowerCase().includes(lq)||(c.client_message||'').toLowerCase().includes(lq)); }

  document.getElementById('cList').innerHTML = items.map(c=>`
    <div class="cv ${c.id===selId?'sel':''}" onclick="selectConv('${c.id}')">
      <div class="cv-top"><span class="cv-name">${esc(c.client_name)}</span><span class="cv-time">${ago(c.updated_at)}</span></div>
      <div class="cv-msg">${esc(c.client_message||'Fără mesaje recente')}</div>
      <div class="cv-meta">
        <span class="badge-sm b-${c.status}">${stLbl(c.status)}</span>
        ${c.tool_action?`<span class="badge-sm b-info">🔧 ${esc(c.tool_action)}</span>`:''}
        ${c.has_event_plan?`<span class="badge-sm b-info">📋 plan</span>`:''}
        ${c.safety_class?`<span class="badge-sm ${safeClass(c.safety_class)}">${esc(c.safety_class.replace(/_/g,' '))}</span>`:''}
      </div>
    </div>
  `).join('');
}

// ─── SELECT CONVERSATION ───
async function selectConv(convId) {
  selId = convId;
  const item = inbox.find(i=>i.id===convId);
  curClient = item?.client_id;
  renderList(document.getElementById('sBox')?.value||'');

  const cp = document.getElementById('centerP');
  cp.innerHTML = '<div class="empty-state">Se încarcă...</div>';

  try {
    // Get full client detail
    const r = await fetch(`${API}/api/admin/crm/clients/${curClient}`, {headers:H()});
    const d = await r.json();
    const client = d.client || {};
    const messages = d.latest_messages || [];
    const plans = d.event_plans || [];
    const aiDec = d.ai_decisions || [];
    const latestDec = aiDec[0] || {};

    // Determine AI reply and tool_action
    const aiReply = item?.ai_reply || latestDec?.decision?.response || latestDec?.ai_reply || '';
    const toolAction = item?.tool_action || latestDec?.decision?.tool_action || latestDec?.tool_action || '';
    const safetyC = item?.safety_class || latestDec?.safety_class || '';
    const confidence = item?.confidence || latestDec?.confidence || '';

    // Active plan for this conversation
    const activePlan = plans.find(p=>['draft','active'].includes(p.status));

    cp.innerHTML = `
      <div class="detail-header">
        <div>
          <h2>${esc(client.display_name || client.alias || client.mapped_alias || 'Client')}</h2>
          <span class="sub">${client.source||'whatsapp'} · ${(d.conversations||[]).length} conv · ${messages.length} msg</span>
        </div>
        <span class="mem-link" onclick="toggleMem(true,'${curClient}')">📋 Memorie client</span>
      </div>

      ${activePlan ? renderPlanCard(activePlan) : ''}

      <div class="msgs" id="msgsArea">
        ${messages.length ? messages.map(m=>{
          const who = m.sender_type==='client'?'cl':m.sender_type==='ai'?'ai':'ag';
          const icon = who==='cl'?'👤':who==='ai'?'🤖':'👨‍💼';
          return `<div class="m ${who}"><div class="m-who">${icon} ${m.sender_type}</div>${esc(m.content||'')}<div class="m-time">${new Date(m.created_at).toLocaleString('ro-RO')}</div></div>`;
        }).join('') : '<div style="color:var(--text-dim);text-align:center;padding:30px">Fără mesaje</div>'}
      </div>

      <div class="ai-box">
        <div class="ai-label">
          🤖 Răspuns AI propus
          ${toolAction?`<span class="tool-act">🔧 ${esc(toolAction)}</span>`:''}
          ${safetyC?`<span class="safety ${safeClass(safetyC)}">${esc(safetyC.replace(/_/g,' '))}</span>`:''}
          ${confidence?`<span class="safety safe-ok">${confidence}% conf</span>`:''}
        </div>
        <textarea class="ai-text" id="aiText">${esc(aiReply)}</textarea>
        <div class="ai-actions">
          <button class="btn b-approve" onclick="doAction('approve')">✓ Aprobă</button>
          <button class="btn b-edit" onclick="document.getElementById('aiText').focus()">✎ Editează</button>
          <button class="btn b-clarify" onclick="doAction('clarify')">? Clarificare</button>
          <button class="btn b-operator" onclick="doAction('handoff')">→ Operator</button>
          <button class="btn b-mem" onclick="toggleMem(true,'${curClient}')">📋 Memorie</button>
          <button class="btn b-rule" onclick="doAction('make_rule')">+ Regulă</button>
        </div>
      </div>
    `;

    const area = document.getElementById('msgsArea');
    if(area) area.scrollTop = area.scrollHeight;
  } catch(e) {
    cp.innerHTML = `<div class="empty-state" style="color:var(--red)">Eroare: ${e.message}</div>`;
  }
}

function renderPlanCard(plan) {
  const missing = plan.missing_fields || [];
  return `<div class="plan-card">
    <h4>📋 ${plan.status==='draft'?'Draft':'Plan'} eveniment · ${esc(plan.event_type||'?')}</h4>
    <div class="plan-row">
      ${plan.event_date?`<div class="plan-field"><span class="label">Data: </span><span class="val">${plan.event_date}</span></div>`:''}
      ${plan.event_time?`<div class="plan-field"><span class="label">Ora: </span><span class="val">${plan.event_time}</span></div>`:''}
      ${plan.location?`<div class="plan-field"><span class="label">Loc: </span><span class="val">${esc(plan.location)}</span></div>`:''}
      <div class="plan-field"><span class="label">Status: </span><span class="val">${plan.status}</span></div>
      <div class="plan-field"><span class="label">Quote: </span><span class="val">${plan.readiness_for_quote?'✓ ready':'✗ not ready'}</span></div>
    </div>
    ${missing.length?`<div class="plan-missing">⚠ Câmpuri lipsă: ${missing.join(', ')}</div>`:''}
  </div>`;
}

// ─── ACTIONS ───
async function doAction(type) {
  const text = document.getElementById('aiText')?.value || '';
  const traceId = `${type}-${curClient}-${Date.now()}`;
  try {
    await fetch(`${API}/api/admin/corrections`, {
      method:'POST', headers:H(),
      body: JSON.stringify({
        trace_id: traceId,
        request: { client_id: curClient, conversation_id: selId },
        original_decision: { ai_reply: text },
        corrected_decision: { action: type, response: type==='approve'?text:'' },
        tags: [type],
        policy_version: 'v1.0.0'
      })
    });
    const msgs = {approve:'✓ Aprobat',clarify:'Marcat: clarificare',handoff:'Trimis la operator',make_rule:'Salvat ca bază de regulă'};
    toast(msgs[type]||'Salvat');
  } catch(e) { toast('Eroare: '+e.message, false); }
}

// ─── MEMORY ───
function toggleMem(show, cid) {
  const p = document.getElementById('rightP');
  if(show) { p.classList.remove('hidden'); p.style.display='flex'; loadMem(cid||curClient); }
  else { p.classList.add('hidden'); p.style.display='none'; }
}

async function loadMem(cid) {
  if(!cid) return;
  const body = document.getElementById('mBody');
  body.innerHTML = '<div style="color:var(--text-dim);padding:16px">Se încarcă...</div>';
  try {
    const r = await fetch(`${API}/api/admin/memory/${cid}`, {headers:H()});
    const d = await r.json();
    const mem = d.memory || {};
    const plans = d.event_plans || [];
    const quotes = d.quotes || [];
    document.getElementById('mName').textContent = mem.client_name || 'Client';

    body.innerHTML = `
      <div class="mem-sec"><h4>Profil</h4>
        ${mf('Nume',mem.client_name||'—',cid,'client_name')}
        ${mf('Locație',mem.location||mem.preferences?.location||'—',cid,'location')}
        ${mf('Servicii',(mem.services_requested||[]).join(', ')||'—',cid,'services_requested')}
        ${mf('Recurent',mem.is_recurring?'✓ Da':'Nu',cid,'is_recurring')}
      </div>
      ${mem.preferences?`<div class="mem-sec"><h4>Preferințe</h4>${Object.entries(mem.preferences).map(([k,v])=>mf(k.replaceAll('_',' '),typeof v==='object'?JSON.stringify(v):v,cid,'pref.'+k)).join('')}</div>`:''}
      ${plans.length?`<div class="mem-sec"><h4>Planuri (${plans.length})</h4>${plans.map(p=>`<div class="mf"><div class="lbl">${p.event_type||'Eveniment'} · ${p.status}</div><div class="val">${p.event_date?new Date(p.event_date).toLocaleDateString('ro-RO'):'—'} ${p.location||''}</div></div>`).join('')}</div>`:''}
      ${quotes.length?`<div class="mem-sec"><h4>Cotații</h4>${quotes.map(q=>`<div class="mf"><div class="val">${q.grand_total||q.total_amount||'—'} RON · ${q.status||'?'}</div></div>`).join('')}</div>`:''}
      <div class="mem-sec note-area"><h4>Notă</h4><textarea id="noteT" placeholder="Notă..."></textarea><button class="note-btn" onclick="addNote('${cid}')">Salvează</button></div>
    `;
  } catch(e) { body.innerHTML=`<div style="color:var(--red);padding:16px">${e.message}</div>`; }
}

function mf(label, value, cid, key) {
  return `<div class="mf"><div class="lbl">${esc(label)}</div><div class="val">${esc(String(value))}</div>
    <div class="mf-acts"><button onclick="markMem('${cid}','${key}','correct')">✓</button><button class="wrong" onclick="markMem('${cid}','${key}','wrong')">✗</button><button onclick="markMem('${cid}','${key}','outdated')">⏰</button></div></div>`;
}

async function markMem(cid, field, status) {
  try { await fetch(`${API}/api/admin/memory/${cid}/note`, { method:'POST', headers:H(), body:JSON.stringify({note:`[${status.toUpperCase()}] ${field}`,changed_by:'operator'}) }); toast(`Marcat: ${status}`); } catch(e) { toast('Eroare',false); }
}

async function addNote(cid) {
  const n = document.getElementById('noteT')?.value; if(!n) return;
  try { await fetch(`${API}/api/admin/memory/${cid}/note`, { method:'POST', headers:H(), body:JSON.stringify({note:n,changed_by:'operator'}) }); toast('Notă salvată'); document.getElementById('noteT').value=''; } catch(e) { toast('Eroare',false); }
}

// ─── RULES ───
async function loadRules() {
  const v = document.getElementById('rulesV');
  v.innerHTML = '<h2 style="font-size:15px;margin-bottom:12px">Reguli AI</h2><div style="color:var(--text-dim)">Se încarcă...</div>';
  try {
    const r = await fetch(`${API}/api/ai/brain/rules`, {headers:H()});
    const d = await r.json();
    const rules = d.rules || d || [];
    const bL = {'CLARIFY_FIRST':'🔍 Clarificare','USE_KB':'📖 KB','HANDOFF':'👤 Operator','AUTO_REPLY':'✓ Auto','BLOCK':'🚫 Block'};
    const tL = {'PRICE_QUESTION':'Preț','COSTUME_QUERY':'Costume','RESCHEDULE':'Reprogramare','COMPLAINT':'Plângere','GENERAL':'General'};

    // Load services for config section
    let svcHtml = '';
    try {
      const sr = await fetch(`${API}/api/operator/services`, {headers:H()});
      const sd = await sr.json();
      if(sd.services?.length) {
        svcHtml = `<div class="svc-section"><h3 style="font-size:14px;margin-bottom:10px">Servicii configurate (${sd.services.length})</h3>
          <p style="font-size:11px;color:var(--text-muted);margin-bottom:10px">Detaliile obligatorii per categorie de serviciu. Acestea ghidează ce întreabă AI-ul.</p>
          ${sd.services.map(s=>`<div class="svc-card"><h4>${esc(s.display_name)} <span style="color:var(--text-dim);font-weight:400;font-size:10px">${s.service_key}</span></h4>
            <div class="fields">${(s.required_fields||[]).map(f=>`<span class="field-tag field-req">${f}</span>`).join('')}${(s.optional_fields||[]).map(f=>`<span class="field-tag field-opt">${f}</span>`).join('')}</div>
            ${s.standard_questions?.length?`<div style="margin-top:4px;font-size:10px;color:var(--text-dim)">Întrebări: ${s.standard_questions.slice(0,2).join(' · ')}${s.standard_questions.length>2?' ...':''}</div>`:''}
          </div>`).join('')}
        </div>`;
      }
    } catch(e) { /* ignore */ }

    v.innerHTML = `
      <h2 style="font-size:15px;margin-bottom:4px">Reguli AI <span style="font-size:11px;color:var(--text-muted);font-weight:400">${rules.length} reguli</span></h2>
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:14px">Cum răspunde AI-ul la diferite mesaje</p>
      ${rules.map(r=>`<div class="rc"><div class="rc-top"><span class="rc-name">${esc(r.name||'')}</span><div class="toggle"><input type="checkbox" id="rt_${r.id}" ${r.status==='active'?'checked':''} onchange="toggleR('${r.id}',this.checked)"><label for="rt_${r.id}"></label></div></div>
        <div class="rc-desc">${esc(r.description||bL[r.behavior]||'')}</div>
        <div class="rc-tags"><span class="rtag">Când: ${tL[r.trigger]||r.trigger||'?'}</span><span class="rtag">Face: ${bL[r.behavior]||r.behavior||'?'}</span>${r.priority?`<span class="rtag">P${r.priority}</span>`:''}</div></div>`).join('')}
      <button class="add-btn" onclick="openRM()">+ Regulă nouă</button>
      ${svcHtml}
    `;
  } catch(e) { v.innerHTML=`<h2>Reguli AI</h2><div style="color:var(--red)">${e.message}</div>`; }
}

async function toggleR(id, on) { try { await fetch(`${API}/api/ai/brain/rules/${id}`, {method:'PUT',headers:H(),body:JSON.stringify({status:on?'active':'inactive'})}); toast(on?'Activat':'Dezactivat'); } catch(e) { toast('Eroare',false); } }

function openRM() { document.getElementById('ruleM').classList.add('show'); }
function closeRM() { document.getElementById('ruleM').classList.remove('show'); }
async function saveR() {
  const n=document.getElementById('rmN').value, d=document.getElementById('rmD').value, t=document.getElementById('rmT').value, b=document.getElementById('rmB').value;
  if(!n||!t||!b) return toast('Completează câmpurile',false);
  try { await fetch(`${API}/api/ai/brain/rules`,{method:'POST',headers:H(),body:JSON.stringify({name:n,description:d,trigger:t,behavior:b,stage:'DISCOVERY',priority:50,status:'active'})}); toast('Regulă adăugată'); closeRM(); loadRules(); } catch(e) { toast('Eroare',false); }
}

    <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px">Module tehnice — folosește doar când e necesar</p>
    <div class="admin-grid">
      <a class="admin-card" href="admin-suite.html" target="_blank"><h4>📊 Dashboard</h4><p>Overview complet</p></a>
      <a class="admin-card" href="admin-suite.html#crm" target="_blank"><h4>👥 CRM</h4><p>Toți clienții</p></a>

      <a class="admin-card" href="../brain/brain-console.html#coverage" target="_blank"><h4>📡 Coverage</h4><p>Zone AI</p></a>

// ─── HEALTH ───
async function checkH() {
  try { const r=await fetch(`${API}/health`); const d=await r.json(); const h=document.getElementById('hDot'); h.textContent=`${d.status} · v${d.policy_version||'?'} · ${d.policy_rules||0}r`; h.style.color=d.status==='ok'?'var(--green)':'var(--red)'; } catch(e) { document.getElementById('hDot').textContent='Offline'; document.getElementById('hDot').style.color='var(--red)'; }
}

// ─── AUTH ───
if(!TK) { const t=prompt('Token de acces:'); if(t){localStorage.setItem('admin_token',t);location.reload();} }

// ─── INIT ───
checkH(); loadInbox();
setInterval(checkH, 30000);
setInterval(loadInbox, 60000);
</script>
